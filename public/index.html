<!DOCTYPE html>
<html>

<head>

    <title>WhatsApp Salary Sender</title>

    <style>

        body{
            font-family: Arial;
            background:#f5f5f5;
            padding:40px;
        }

        .box{
            width:400px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
            text-align:center;
        }

        h1{
            color:#25D366;
        }

        input{
            margin-top:20px;
        }

        button{

            margin-top:20px;
            background:#25D366;
            color:white;
            border:none;
            padding:12px 25px;
            font-size:18px;
            border-radius:5px;
            cursor:pointer;

        }

        button:hover{
            background:#1ebc57;
        }

    </style>

</head>

<body>

    <div class="box">

        <h1>WhatsApp Salary Sender</h1>

        <form action="/send" method="POST" enctype="multipart/form-data">

            <input type="file" name="file" required>

            <br>

            <button type="submit">
                Send WhatsApp
            </button>

        </form>

    </div>

</body>

</html>
